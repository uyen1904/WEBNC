
<table border="1">
    <caption>List of Products</caption>
    <thead>
        <tr>
            <th>Product ID</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Picture</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let p of product">
            <td>{{p.id}}</td>
            <td>{{p.name}}</td>
            <td>{{p.price}}</td>
            <td>
                <img width="115" height="150" src="{{p.image}}"/>
            </td>
            <td>
                <a (click)="view_detail(p.id)">Details</a>
            </td>
        </tr>
    </tbody>
</table>

<button (click)="go_back()">Back to Fashions</button>

<div *ngIf="fashion && fashion._id; else loading"> 
  <table>
    <tr> 
        <td>Fashion Id:</td> 
        <td>{{fashion._id}}</td> 
    </tr> 
    <tr> 
        <td>Fashion Subject:</td> 
        <td>{{fashion.fashion_subject}}</td> 
    </tr> 
    <tr> 
        <td>Fashion Detail:</td> 
        <td>{{fashion.fashion_detail}} </td> 
    </tr> 
    <tr> 
        <td colspan="2"> 
            <img [src]="get_image(fashion.fashion_image)" width="100px" height="100px"> 
        </td> 
    </tr>        
  </table>
</div>

<ng-template #loading>
  <p>Loading...</p>
</ng-template>
